<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">cadhan.dev portfolio preview</title>
  <desc id="desc">A dark purple portfolio preview card for Cádhan Nelis.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#22163a" />
      <stop offset="34%" stop-color="#1a1830" />
      <stop offset="72%" stop-color="#131721" />
      <stop offset="100%" stop-color="#0d1017" />
    </linearGradient>
    <linearGradient id="washTop" x1="0.12" y1="0" x2="0.88" y2="1">
      <stop offset="0%" stop-color="#3c235f" stop-opacity="0.52" />
      <stop offset="38%" stop-color="#262041" stop-opacity="0.24" />
      <stop offset="100%" stop-color="#262041" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="washBottom" x1="0" y1="0.1" x2="1" y2="0.9">
      <stop offset="0%" stop-color="#141927" stop-opacity="0" />
      <stop offset="58%" stop-color="#161b2b" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#0d1119" stop-opacity="0.54" />
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8f6bff" stop-opacity="0.12" />
      <stop offset="45%" stop-color="#9f7eff" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#8f6bff" stop-opacity="0.12" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#washTop)" />
  <rect width="1200" height="630" fill="url(#washBottom)" />

  <rect x="90" y="126" width="1020" height="2" rx="1" fill="url(#line)" />

  <g font-family="'JetBrains Mono', 'SFMono-Regular', Menlo, Consolas, monospace" fill="#f7f5ff">
